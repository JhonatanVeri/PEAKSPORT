<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PeakSport - Catálogo Completo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #1a1a1a;
      --bg-card: #1f1f1f;
      --text-primary: #ffffff;
      --text-secondary: #a1a1aa;
      --accent-red: #ef4444;
      --accent-blue: #3b82f6;
      --accent-green: #10b981;
      --accent-purple: #8b5cf6;
      --accent-pink: #ec4899;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    
    .dark-gradient {
      background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
    }
    
    .gradient-bg {
      background: linear-gradient(135deg, var(--accent-red) 0%, #dc2626 100%);
    }
    
    .gradient-blue {
      background: linear-gradient(135deg, var(--accent-blue) 0%, #2563eb 100%);
    }
    
    .gradient-green {
      background: linear-gradient(135deg, var(--accent-green) 0%, #059669 100%);
    }
    
    .gradient-purple {
      background: linear-gradient(135deg, var(--accent-purple) 0%, #7c3aed 100%);
    }
    
    .gradient-pink {
      background: linear-gradient(135deg, var(--accent-pink) 0%, #db2777 100%);
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    
    .card-hover {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .card-hover:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      border-color: rgba(239, 68, 68, 0.4);
    }
    
    .category-active {
      background: linear-gradient(135deg, var(--accent-red) 0%, #dc2626 100%);
      color: white;
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
    }
    
    .slide-in {
      animation: slideIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .fade-in {
      animation: fadeIn 0.5s ease-in-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .elegant-shadow {
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4), 0 2px 10px rgba(0, 0, 0, 0.2);
    }
    
    .subtle-glow {
      box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
    }
    
    .floating-animation {
      animation: floating 6s ease-in-out infinite;
    }
    
    @keyframes floating {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    .filter-input {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .filter-input:focus {
      outline: none;
      border-color: var(--accent-red);
      box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
    }
    
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body class="dark-gradient min-h-screen">

  <!-- 🔝 Header -->
  <header class="glass-card shadow-2xl fixed w-full z-50 border-b border-red-500/20">
    <div class="max-w-7xl mx-auto flex justify-between items-center py-4 px-6">
      <div class="flex items-center space-x-4">
        <button onclick="goBack()" class="flex items-center space-x-2 text-gray-300 hover:text-red-400 transition-all duration-300 hover:scale-105">
          <i class="fas fa-arrow-left text-lg"></i>
          <span class="font-medium hidden sm:block">Volver</span>
        </button>
      </div>
      
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 gradient-bg rounded-xl flex items-center justify-center floating-animation subtle-glow">
          <i class="fas fa-shopping-bag text-white"></i>
        </div>
        <h1 class="text-2xl font-bold text-red-400">Catálogo</h1>
      </div>
      
      <div class="flex items-center space-x-4">
        <button class="relative p-3 hover:bg-white/10 rounded-xl transition-all duration-300 group" onclick="toggleCart()">
          <svg class="w-6 h-6 text-gray-300 group-hover:text-red-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M3 3h2l.4 2M7 13h10l4-8H5.4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="9" cy="21" r="1" />
            <circle cx="20" cy="21" r="1" />
          </svg>
          <span id="cartCount" class="absolute -top-1 -right-1 gradient-bg text-white text-xs px-2 py-1 rounded-full min-w-[20px] text-center font-bold">0</span>
        </button>
        
        <div class="flex items-center space-x-3 glass-card rounded-full px-4 py-2">
          <img src="https://i.pravatar.cc/32?seed=andres" alt="avatar" class="w-8 h-8 rounded-full border-2 border-red-500">
          <span class="font-medium text-sm text-gray-300 hidden sm:block">Andrés</span>
        </div>
      </div>
    </div>
  </header>

  <main class="pt-24 max-w-7xl mx-auto px-6 pb-16">
    
    <!-- 🔍 Barra de búsqueda y filtros -->
    <section class="mb-8 slide-in">
      <div class="glass-card rounded-3xl p-6 border border-white/10">
        <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between space-y-4 lg:space-y-0 lg:space-x-6">
          
          <!-- Búsqueda -->
          <div class="flex-1 max-w-md">
            <div class="relative">
              <input 
                type="text" 
                id="searchInput"
                placeholder="Buscar productos..."
                class="w-full filter-input rounded-xl px-4 py-3 pl-12 text-white placeholder-gray-500"
                oninput="filterProducts()"
              >
              <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
            </div>
          </div>
          
          <!-- Ordenamiento -->
          <div class="flex items-center space-x-4">
            <select id="sortSelect" onchange="sortProducts()" class="filter-input rounded-xl px-4 py-3 text-white">
              <option value="name">Ordenar por nombre</option>
              <option value="price-low">Precio: menor a mayor</option>
              <option value="price-high">Precio: mayor a menor</option>
              <option value="rating">Mejor calificación</option>
              <option value="popular">Más popular</option>
            </select>
            
            <button onclick="toggleFilters()" class="glass-card px-4 py-3 rounded-xl hover:bg-white/10 transition-all flex items-center space-x-2">
              <i class="fas fa-filter text-gray-300"></i>
              <span class="text-gray-300 hidden sm:block">Filtros</span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
      
      <!-- 🎛️ Panel de filtros -->
      <aside id="filtersPanel" class="lg:col-span-1">
        <div class="glass-card rounded-3xl p-6 border border-white/10 sticky top-28 slide-in">
          <h3 class="text-xl font-bold text-white mb-6">Filtros</h3>
          
          <!-- Categorías -->
          <div class="mb-6">
            <h4 class="font-semibold text-gray-300 mb-4">Categorías</h4>
            <div class="space-y-2">
              <button onclick="filterByCategory('all')" class="category-btn category-active w-full text-left px-4 py-3 rounded-xl transition-all hover:bg-white/10">
                <i class="fas fa-th-large mr-3"></i>Todos los productos
              </button>
              <button onclick="filterByCategory('mujer')" class="category-btn w-full text-left px-4 py-3 rounded-xl transition-all hover:bg-white/10 text-gray-300">
                <i class="fas fa-female mr-3"></i>Ropa Mujer
              </button>
              <button onclick="filterByCategory('hombre')" class="category-btn w-full text-left px-4 py-3 rounded-xl transition-all hover:bg-white/10 text-gray-300">
                <i class="fas fa-male mr-3"></i>Ropa Hombre
              </button>
              <button onclick="filterByCategory('niños')" class="category-btn w-full text-left px-4 py-3 rounded-xl transition-all hover:bg-white/10 text-gray-300">
                <i class="fas fa-child mr-3"></i>Ropa Niños
              </button>
              <button onclick="filterByCategory('accesorios')" class="category-btn w-full text-left px-4 py-3 rounded-xl transition-all hover:bg-white/10 text-gray-300">
                <i class="fas fa-gem mr-3"></i>Accesorios
              </button>
              <button onclick="filterByCategory('implementos')" class="category-btn w-full text-left px-4 py-3 rounded-xl transition-all hover:bg-white/10 text-gray-300">
                <i class="fas fa-dumbbell mr-3"></i>Implementos
              </button>
            </div>
          </div>
          
          <!-- Rango de precio -->
          <div class="mb-6">
            <h4 class="font-semibold text-gray-300 mb-4">Precio</h4>
            <div class="space-y-3">
              <div class="flex space-x-2">
                <input type="number" id="minPrice" placeholder="Min" class="filter-input rounded-lg px-3 py-2 text-white w-full" oninput="filterProducts()">
                <input type="number" id="maxPrice" placeholder="Max" class="filter-input rounded-lg px-3 py-2 text-white w-full" oninput="filterProducts()">
              </div>
              <div class="flex flex-wrap gap-2">
                <button onclick="setPriceRange(0, 50)" class="text-xs px-3 py-1 glass-card rounded-full hover:bg-white/10 transition-all text-gray-300">$0 - $50</button>
                <button onclick="setPriceRange(50, 100)" class="text-xs px-3 py-1 glass-card rounded-full hover:bg-white/10 transition-all text-gray-300">$50 - $100</button>
                <button onclick="setPriceRange(100, 200)" class="text-xs px-3 py-1 glass-card rounded-full hover:bg-white/10 transition-all text-gray-300">$100+</button>
              </div>
            </div>
          </div>
          
          <!-- Marcas -->
          <div class="mb-6">
            <h4 class="font-semibold text-gray-300 mb-4">Marcas</h4>
            <div class="space-y-2">
              <label class="flex items-center space-x-3 cursor-pointer">
                <input type="checkbox" class="brand-filter" value="Nike" onchange="filterProducts()">
                <span class="text-gray-300">Nike</span>
              </label>
              <label class="flex items-center space-x-3 cursor-pointer">
                <input type="checkbox" class="brand-filter" value="Adidas" onchange="filterProducts()">
                <span class="text-gray-300">Adidas</span>
              </label>
              <label class="flex items-center space-x-3 cursor-pointer">
                <input type="checkbox" class="brand-filter" value="Puma" onchange="filterProducts()">
                <span class="text-gray-300">Puma</span>
              </label>
              <label class="flex items-center space-x-3 cursor-pointer">
                <input type="checkbox" class="brand-filter" value="Under Armour" onchange="filterProducts()">
                <span class="text-gray-300">Under Armour</span>
              </label>
            </div>
          </div>
          
          <!-- Tallas -->
          <div class="mb-6">
            <h4 class="font-semibold text-gray-300 mb-4">Tallas</h4>
            <div class="grid grid-cols-3 gap-2">
              <button onclick="toggleSize('XS')" class="size-btn text-xs px-3 py-2 glass-card rounded-lg hover:bg-white/10 transition-all text-gray-300">XS</button>
              <button onclick="toggleSize('S')" class="size-btn text-xs px-3 py-2 glass-card rounded-lg hover:bg-white/10 transition-all text-gray-300">S</button>
              <button onclick="toggleSize('M')" class="size-btn text-xs px-3 py-2 glass-card rounded-lg hover:bg-white/10 transition-all text-gray-300">M</button>
              <button onclick="toggleSize('L')" class="size-btn text-xs px-3 py-2 glass-card rounded-lg hover:bg-white/10 transition-all text-gray-300">L</button>
              <button onclick="toggleSize('XL')" class="size-btn text-xs px-3 py-2 glass-card rounded-lg hover:bg-white/10 transition-all text-gray-300">XL</button>
              <button onclick="toggleSize('XXL')" class="size-btn text-xs px-3 py-2 glass-card rounded-lg hover:bg-white/10 transition-all text-gray-300">XXL</button>
            </div>
          </div>
          
          <!-- Botón limpiar filtros -->
          <button onclick="clearFilters()" class="w-full gradient-bg text-white py-3 rounded-xl hover:scale-105 transition-all font-medium">
            <i class="fas fa-refresh mr-2"></i>
            Limpiar filtros
          </button>
        </div>
      </aside>
      
      <!-- 🛍️ Grid de productos -->
      <section class="lg:col-span-3">
        <div class="flex items-center justify-between mb-6">
          <div>
            <h2 class="text-2xl font-bold text-white" id="categoryTitle">Todos los productos</h2>
            <p class="text-gray-400" id="productCount">Mostrando 59 productos</p>
          </div>
          
          <div class="flex items-center space-x-2">
            <button onclick="setGridView(2)" class="p-2 glass-card rounded-lg hover:bg-white/10 transition-all">
              <i class="fas fa-th-large text-gray-300"></i>
            </button>
            <button onclick="setGridView(3)" class="p-2 glass-card rounded-lg hover:bg-white/10 transition-all">
              <i class="fas fa-th text-gray-300"></i>
            </button>
            <button onclick="setGridView(4)" class="p-2 glass-card rounded-lg hover:bg-white/10 transition-all">
              <i class="fas fa-grip-horizontal text-gray-300"></i>
            </button>
          </div>
        </div>
        
        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
          <!-- Los productos se cargarán aquí -->
        </div>
        
        <!-- Paginación -->
        <div class="mt-12 flex justify-center">
          <div class="flex items-center space-x-2">
            <button class="px-4 py-2 glass-card rounded-lg hover:bg-white/10 transition-all text-gray-300">
              <i class="fas fa-chevron-left"></i>
            </button>
            <button class="px-4 py-2 gradient-bg text-white rounded-lg">1</button>
            <button class="px-4 py-2 glass-card rounded-lg hover:bg-white/10 transition-all text-gray-300">2</button>
            <button class="px-4 py-2 glass-card rounded-lg hover:bg-white/10 transition-all text-gray-300">3</button>
            <button class="px-4 py-2 glass-card rounded-lg hover:bg-white/10 transition-all text-gray-300">
              <i class="fas fa-chevron-right"></i>
            </button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Notification -->
  <div id="notification" class="fixed top-24 right-6 glass-card text-white px-6 py-4 rounded-2xl shadow-2xl transform translate-x-full transition-all duration-500 z-50 border elegant-shadow">
    <div class="flex items-center space-x-3">
      <div id="notificationIcon" class="w-10 h-10 rounded-full flex items-center justify-center">
        <i class="fas fa-check text-white"></i>
      </div>
      <div>
        <div class="font-bold" id="notificationTitle">Notificación</div>
        <div class="text-gray-300 text-sm" id="notificationMessage">Mensaje</div>
      </div>
    </div>
  </div>

  <script>
    // Base de datos de productos
    const products = [
      // Ropa Mujer
      { id: 1, name: 'Leggings Deportivos', brand: 'Nike', price: 45.00, category: 'mujer', image: 'https://images.unsplash.com/photo-1506629905607-45e5e6aa4b5b?w=300&h=300&fit=crop', rating: 4.8, sizes: ['XS', 'S', 'M', 'L', 'XL'], colors: ['Negro', 'Gris'], popular: true },
      { id: 2, name: 'Top Deportivo', brand: 'Adidas', price: 35.00, category: 'mujer', image: 'https://images.unsplash.com/photo-1544966503-7cc5ac882d5f?w=300&h=300&fit=crop', rating: 4.6, sizes: ['XS', 'S', 'M', 'L'], colors: ['Rosa', 'Negro'], popular: false },
      { id: 3, name: 'Chaqueta Running', brand: 'Puma', price: 75.00, category: 'mujer', image: 'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=300&h=300&fit=crop', rating: 4.7, sizes: ['S', 'M', 'L', 'XL'], colors: ['Azul', 'Negro'], popular: true },
      { id: 4, name: 'Shorts Deportivos', brand: 'Under Armour', price: 28.00, category: 'mujer', image: 'https://images.unsplash.com/photo-1594736797933-d0401ba2fe65?w=300&h=300&fit=crop', rating: 4.5, sizes: ['XS', 'S', 'M', 'L'], colors: ['Negro', 'Gris'], popular: false },
      
      // Ropa Hombre
      { id: 5, name: 'Camiseta Dry-Fit', brand: 'Nike', price: 32.00, category: 'hombre', image: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=300&h=300&fit=crop', rating: 4.9, sizes: ['S', 'M', 'L', 'XL', 'XXL'], colors: ['Azul', 'Negro', 'Blanco'], popular: true },
      { id: 6, name: 'Pantalón Jogger', brand: 'Adidas', price: 55.00, category: 'hombre', image: 'https://images.unsplash.com/photo-1594736797933-d0401ba2fe65?w=300&h=300&fit=crop', rating: 4.6, sizes: ['S', 'M', 'L', 'XL'], colors: ['Negro', 'Gris'], popular: true },
      { id: 7, name: 'Sudadera Capucha', brand: 'Puma', price: 68.00, category: 'hombre', image: 'https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=300&h=300&fit=crop', rating: 4.7, sizes: ['M', 'L', 'XL', 'XXL'], colors: ['Negro', 'Gris', 'Azul'], popular: false },
      { id: 8, name: 'Shorts Training', brand: 'Under Armour', price: 38.00, category: 'hombre', image: 'https://images.unsplash.com/photo-1594736797933-d0401ba2fe65?w=300&h=300&fit=crop', rating: 4.4, sizes: ['S', 'M', 'L', 'XL'], colors: ['Negro', 'Azul'], popular: false },
      
      // Ropa Niños
      { id: 9, name: 'Conjunto Deportivo', brand: 'Nike', price: 42.00, category: 'niños', image: 'https://images.unsplash.com/photo-1503944583220-79d8926ad5e2?w=300&h=300&fit=crop', rating: 4.8, sizes: ['XS', 'S', 'M'], colors: ['Azul', 'Rosa'], popular: true },
      { id: 10, name: 'Camiseta Fútbol', brand: 'Adidas', price: 25.00, category: 'niños', image: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=300&h=300&fit=crop', rating: 4.6, sizes: ['XS', 'S', 'M'], colors: ['Rojo', 'Azul'], popular: false },
      { id: 11, name: 'Zapatillas Kids', brand: 'Puma', price: 48.00, category: 'niños', image: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=300&h=300&fit=crop', rating: 4.7, sizes: ['28', '30', '32', '34'], colors: ['Rosa', 'Azul'], popular: true },
      
      // Accesorios
      { id: 12, name: 'Gorra Deportiva', brand: 'Nike', price: 22.00, category: 'accesorios', image: 'https://images.unsplash.com/photo-1588850561407-ed78c282e89b?w=300&h=300&fit=crop', rating: 4.5, sizes: ['Única'], colors: ['Negro', 'Blanco', 'Azul'], popular: false },
      { id: 13, name: 'Mochila Deportiva', brand: 'Adidas', price: 65.00, category: 'accesorios', image: 'https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=300&h=300&fit=crop', rating: 4.8, sizes: ['Única'], colors: ['Negro', 'Azul'], popular: true },
      { id: 14, name: 'Botella de Agua', brand: 'Under Armour', price: 18.00, category: 'accesorios', image: 'https://images.unsplash.com/photo-1602143407151-7111542de6e8?w=300&h=300&fit=crop', rating: 4.6, sizes: ['500ml', '750ml'], colors: ['Negro', 'Azul', 'Rosa'], popular: false },
      { id: 15, name: 'Guantes Gym', brand: 'Puma', price: 25.00, category: 'accesorios', image: 'https://images.unsplash.com/photo-1584464491033-06628f3a6b7b?w=300&h=300&fit=crop', rating: 4.7, sizes: ['S', 'M', 'L'], colors: ['Negro'], popular: true },
      
      // Implementos
      { id: 16, name: 'Balón Fútbol', brand: 'Nike', price: 45.00, category: 'implementos', image: 'https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=300&h=300&fit=crop', rating: 4.9, sizes: ['5'], colors: ['Blanco/Negro'], popular: true },
      { id: 17, name: 'Mancuernas Set', brand: 'Under Armour', price: 85.00, category: 'implementos', image: 'https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=300&h=300&fit=crop', rating: 4.8, sizes: ['5kg', '10kg'], colors: ['Negro'], popular: true },
      { id: 18, name: 'Colchoneta Yoga', brand: 'Adidas', price: 35.00, category: 'implementos', image: 'https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=300&h=300&fit=crop', rating: 4.6, sizes: ['Única'], colors: ['Morado', 'Rosa', 'Azul'], popular: false },
      { id: 19, name: 'Banda Elástica', brand: 'Puma', price: 15.00, category: 'implementos', image: 'https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=300&h=300&fit=crop', rating: 4.4, sizes: ['Ligera', 'Media', 'Fuerte'], colors: ['Verde', 'Rojo', 'Azul'], popular: false }
    ];

    // Estado global
    let currentCategory = 'all';
    let currentProducts = [...products];
    let cartItems = 0;
    let selectedSizes = [];
    let gridColumns = 3;

    // Renderizar productos
    function renderProducts(productsToRender = currentProducts) {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = '';
      
      // Actualizar clases del grid según columnas
      const gridClasses = {
        2: 'grid-cols-1 sm:grid-cols-2',
        3: 'grid-cols-1 sm:grid-cols-2 lg:grid-cols-3',
        4: 'grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4'
      };
      grid.className = `grid ${gridClasses[gridColumns]} gap-6`;
      
      productsToRender.forEach((product, index) => {
        const productCard = document.createElement('div');
        productCard.className = 'glass-card rounded-3xl card-hover p-6 border border-white/10 group fade-in';
        productCard.style.animationDelay = `${index * 0.1}s`;
        
        const discount = product.originalPrice ? Math.round(((product.originalPrice - product.price) / product.originalPrice) * 100) : 0;
        
        productCard.innerHTML = `
          <div class="relative mb-6 overflow-hidden rounded-xl">
            <img src="${product.image}" class="w-full h-48 object-cover group-hover:scale-110 transition-transform duration-500" alt="${product.name}">
            ${product.popular ? '<div class="absolute top-3 left-3 bg-green-500 text-white px-2 py-1 rounded-full text-xs font-bold">⚡ Popular</div>' : ''}
            ${discount > 0 ? `<div class="absolute top-3 right-3 gradient-bg text-white px-3 py-1 rounded-full text-xs font-bold">-${discount}%</div>` : ''}
            <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
          </div>
          
          <div class="space-y-3">
            <div>
              <h4 class="font-bold text-white text-lg group-hover:text-red-400 transition-colors">${product.name}</h4>
              <p class="text-gray-400 text-sm">${product.brand}</p>
            </div>
            
            <div class="flex items-center justify-between">
              <div class="flex items-center space-x-2">
                <span class="text-xl font-bold text-red-400">$${product.price.toFixed(2)}</span>
                ${product.originalPrice ? `<span class="text-sm text-gray-500 line-through">$${product.originalPrice.toFixed(2)}</span>` : ''}
              </div>
              <div class="flex items-center space-x-1">
                <div class="flex">
                  ${Array.from({length: 5}, (_, i) => 
                    `<i class="fas fa-star ${i < Math.floor(product.rating) ? 'text-yellow-400' : 'text-gray-600'} text-xs"></i>`
                  ).join('')}
                </div>
                <span class="text-sm text-gray-400 ml-1">${product.rating}</span>
              </div>
            </div>
            
            <div class="flex flex-wrap gap-1 mb-3">
              ${product.sizes.slice(0, 4).map(size => 
                `<span class="text-xs px-2 py-1 glass-card rounded text-gray-400">${size}</span>`
              ).join('')}
              ${product.sizes.length > 4 ? '<span class="text-xs px-2 py-1 glass-card rounded text-gray-400">+</span>' : ''}

      document.getElementById('productCount').textContent = `Mostrando ${productsToRender.length} productos`;

    // Filtrar por categoría
    function filterByCategory(category) {
      currentCategory = category;
      
      // Actualizar botones de categoría
      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.classList.remove('category-active');
        btn.classList.add('text-gray-300');
      });
      event.target.classList.add('category-active');
      event.target.classList.remove('text-gray-300');
      
      // Actualizar título
      const titles = {
        'all': 'Todos los productos',
        'mujer': 'Ropa Deportiva Mujer',
        'hombre': 'Ropa Deportiva Hombre',
        'niños': 'Ropa Deportiva Niños',
        'accesorios': 'Accesorios Deportivos',
        'implementos': 'Implementos Deportivos'
      };
      document.getElementById('categoryTitle').textContent = titles[category];
      
      filterProducts();
    }

    // Filtrar productos
    function filterProducts() {
      let filtered = [...products];
      
      // Filtro por categoría
      if (currentCategory !== 'all') {
        filtered = filtered.filter(p => p.category === currentCategory);
      }
      
      // Filtro por búsqueda
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      if (searchTerm) {
        filtered = filtered.filter(p => 
          p.name.toLowerCase().includes(searchTerm) || 
          p.brand.toLowerCase().includes(searchTerm)
        );
      }
      
      // Filtro por precio
      const minPrice = parseFloat(document.getElementById('minPrice').value) || 0;
      const maxPrice = parseFloat(document.getElementById('maxPrice').value) || Infinity;
      filtered = filtered.filter(p => p.price >= minPrice && p.price <= maxPrice);
      
      // Filtro por marcas
      const selectedBrands = Array.from(document.querySelectorAll('.brand-filter:checked')).map(cb => cb.value);
      if (selectedBrands.length > 0) {
        filtered = filtered.filter(p => selectedBrands.includes(p.brand));
      }
      
      // Filtro por tallas
      if (selectedSizes.length > 0) {
        filtered = filtered.filter(p => p.sizes.some(size => selectedSizes.includes(size)));
      }
      
      currentProducts = filtered;
      renderProducts();
    }

    // Ordenar productos
    function sortProducts() {
      const sortBy = document.getElementById('sortSelect').value;
      
      switch(sortBy) {
        case 'name':
          currentProducts.sort((a, b) => a.name.localeCompare(b.name));
          break;
        case 'price-low':
          currentProducts.sort((a, b) => a.price - b.price);
          break;
        case 'price-high':
          currentProducts.sort((a, b) => b.price - a.price);
          break;
        case 'rating':
          currentProducts.sort((a, b) => b.rating - a.rating);
          break;
        case 'popular':
          currentProducts.sort((a, b) => b.popular - a.popular);
          break;
      }
      
      renderProducts();
    }

    // Establecer rango de precio
    function setPriceRange(min, max) {
      document.getElementById('minPrice').value = min;
      document.getElementById('maxPrice').value = max === Infinity ? '' : max;
      filterProducts();
    }

    // Toggle talla
    function toggleSize(size) {
      const index = selectedSizes.indexOf(size);
      if (index > -1) {
        selectedSizes.splice(index, 1);
        event.target.classList.remove('category-active');
        event.target.classList.add('text-gray-300');
      } else {
        selectedSizes.push(size);
        event.target.classList.add('category-active');
        event.target.classList.remove('text-gray-300');
      }
      filterProducts();
    }

    // Limpiar filtros
    function clearFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('minPrice').value = '';
      document.getElementById('maxPrice').value = '';
      document.querySelectorAll('.brand-filter').forEach(cb => cb.checked = false);
      selectedSizes = [];
      
      // Resetear botones de talla
      document.querySelectorAll('.size-btn').forEach(btn => {
        btn.classList.remove('category-active');
        btn.classList.add('text-gray-300');
      });
      
      filterProducts();
      showNotification('Filtros limpiados', 'Mostrando todos los productos', 'info');
    }

    // Cambiar vista de grid
    function setGridView(columns) {
      gridColumns = columns;
      renderProducts();
    }

    // Toggle panel de filtros (móvil)
    function toggleFilters() {
      const panel = document.getElementById('filtersPanel');
      panel.classList.toggle('hidden');
    }

    // Agregar al carrito
    function addToCart(productId) {
      const product = products.find(p => p.id === productId);
      cartItems++;
      document.getElementById('cartCount').textContent = cartItems;
      
      // Animación del contador
      const cartCount = document.getElementById('cartCount');
      cartCount.classList.add('pulse-animation');
      setTimeout(() => cartCount.classList.remove('pulse-animation'), 1000);
      
      showNotification('¡Agregado!', `${product.name} añadido al carrito`, 'success');
    }

    // Funciones de navegación
    function goBack() {
      showNotification('Regresando...', 'Volviendo a la página principal', 'info');
      setTimeout(() => window.history.back(), 1000);
    }

    function toggleCart() {
      showNotification('Carrito', 'Abriendo carrito de compras', 'info');
    }

    // Sistema de notificaciones
    function showNotification(title, message, type = 'info') {
      const notification = document.getElementById('notification');
      const icon = document.getElementById('notificationIcon');
      const titleEl = document.getElementById('notificationTitle');
      const messageEl = document.getElementById('notificationMessage');
      
      const config = {
        success: { icon: 'fas fa-check', color: 'gradient-green', border: 'border-green-500/30' },
        error: { icon: 'fas fa-times', color: 'gradient-bg', border: 'border-red-500/30' },
        warning: { icon: 'fas fa-exclamation', color: 'bg-yellow-500', border: 'border-yellow-500/30' },
        info: { icon: 'fas fa-info', color: 'gradient-blue', border: 'border-blue-500/30' }
      };
      
      const typeConfig = config[type];
      icon.className = `w-10 h-10 ${typeConfig.color} rounded-full flex items-center justify-center`;
      icon.innerHTML = `<i class="${typeConfig.icon} text-white"></i>`;
      notification.className = `fixed top-24 right-6 glass-card text-white px-6 py-4 rounded-2xl shadow-2xl transform translate-x-full transition-all duration-500 z-50 border ${typeConfig.border} elegant-shadow`;
      
      titleEl.textContent = title;
      messageEl.textContent = message;
      
      notification.classList.remove('translate-x-full');
      
      setTimeout(() => {
        notification.classList.add('translate-x-full');
      }, 4000);
    }

    // Inicialización
    document.addEventListener('DOMContentLoaded', function() {
      renderProducts();
      
      // Mensaje de bienvenida
      setTimeout(() => {
        showNotification('¡Bienvenido al catálogo!', 'Explora nuestros 59 productos disponibles', 'info');
      }, 500);
    });
  </script>
