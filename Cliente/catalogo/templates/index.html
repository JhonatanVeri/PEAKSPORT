<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PeakSport - Catálogo Completo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="{{ url_for('catalogo.static', filename='css/styles.css') }}">
</head>
<body class="dark-gradient min-h-screen">

  <!-- 🔝 Header -->
  <header class="glass-card shadow-2xl fixed w-full z-50 border-b border-red-500/20">
    <div class="max-w-7xl mx-auto flex justify-between items-center py-4 px-6">
      <div class="flex items-center space-x-4">
        <button onclick="goBack()" class="flex items-center space-x-2 text-gray-300 hover:text-red-400 transition-all duration-300 hover:scale-105">
          <i class="fas fa-arrow-left text-lg"></i>
          <span class="font-medium hidden sm:block">Volver</span>
        </button>
      </div>
      
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 gradient-bg rounded-xl flex items-center justify-center floating-animation subtle-glow">
          <i class="fas fa-shopping-bag text-white"></i>
        </div>
        <h1 class="text-2xl font-bold text-red-400">Catálogo</h1>
      </div>
      
      <div class="flex items-center space-x-4">
        <button class="relative p-3 hover:bg-white/10 rounded-xl transition-all duration-300 group" onclick="toggleCart()">
          <svg class="w-6 h-6 text-gray-300 group-hover:text-red-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M3 3h2l.4 2M7 13h10l4-8H5.4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="9" cy="21" r="1" />
            <circle cx="20" cy="21" r="1" />
          </svg>
          <span id="cartCount" class="absolute -top-1 -right-1 gradient-bg text-white text-xs px-2 py-1 rounded-full min-w-[20px] text-center font-bold">0</span>
        </button>
        
        <div class="flex items-center space-x-3 glass-card rounded-full px-4 py-2">
          <img src="https://i.pravatar.cc/32?seed=andres" alt="avatar" class="w-8 h-8 rounded-full border-2 border-red-500">
          <span class="font-medium text-sm text-gray-300 hidden sm:block">Andrés</span>
        </div>
      </div>
    </div>
  </header>

  <main class="pt-24 max-w-7xl mx-auto px-6 pb-16">
    
    <!-- 🔍 Barra de búsqueda y filtros -->
    <section class="mb-8 slide-in">
      <div class="glass-card rounded-3xl p-6 border border-white/10">
        <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between space-y-4 lg:space-y-0 lg:space-x-6">
          
          <!-- Búsqueda -->
          <div class="flex-1 max-w-md">
            <div class="relative">
              <input 
                type="text" 
                id="searchInput"
                placeholder="Buscar productos..."
                class="w-full filter-input rounded-xl px-4 py-3 pl-12 text-white placeholder-gray-500"
                oninput="filterProducts()"
              >
              <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
            </div>
          </div>
          
          <!-- Ordenamiento -->
          <div class="flex items-center space-x-4">
            <select id="sortSelect" onchange="sortProducts()" class="filter-input rounded-xl px-4 py-3 text-white">
              <option value="name">Ordenar por nombre</option>
              <option value="price-low">Precio: menor a mayor</option>
              <option value="price-high">Precio: mayor a menor</option>
              <option value="rating">Mejor calificación</option>
              <option value="popular">Más popular</option>
            </select>
            
            <button onclick="toggleFilters()" class="glass-card px-4 py-3 rounded-xl hover:bg-white/10 transition-all flex items-center space-x-2">
              <i class="fas fa-filter text-gray-300"></i>
              <span class="text-gray-300 hidden sm:block">Filtros</span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
      
      <!-- 🎛️ Panel de filtros -->
      <aside id="filtersPanel" class="lg:col-span-1">
        <div class="glass-card rounded-3xl p-6 border border-white/10 sticky top-28 slide-in">
          <h3 class="text-xl font-bold text-white mb-6">Filtros</h3>
          
          <!-- Categorías -->
          <div class="mb-6">
            <h4 class="font-semibold text-gray-300 mb-4">Categorías</h4>
            <div class="space-y-2">
              <button onclick="filterByCategory('all')" class="category-btn category-active w-full text-left px-4 py-3 rounded-xl transition-all hover:bg-white/10">
                <i class="fas fa-th-large mr-3"></i>Todos los productos
              </button>
              <button onclick="filterByCategory('mujer')" class="category-btn w-full text-left px-4 py-3 rounded-xl transition-all hover:bg-white/10 text-gray-300">
                <i class="fas fa-female mr-3"></i>Ropa Mujer
              </button>
              <button onclick="filterByCategory('hombre')" class="category-btn w-full text-left px-4 py-3 rounded-xl transition-all hover:bg-white/10 text-gray-300">
                <i class="fas fa-male mr-3"></i>Ropa Hombre
              </button>
              <button onclick="filterByCategory('niños')" class="category-btn w-full text-left px-4 py-3 rounded-xl transition-all hover:bg-white/10 text-gray-300">
                <i class="fas fa-child mr-3"></i>Ropa Niños
              </button>
              <button onclick="filterByCategory('accesorios')" class="category-btn w-full text-left px-4 py-3 rounded-xl transition-all hover:bg-white/10 text-gray-300">
                <i class="fas fa-gem mr-3"></i>Accesorios
              </button>
              <button onclick="filterByCategory('implementos')" class="category-btn w-full text-left px-4 py-3 rounded-xl transition-all hover:bg-white/10 text-gray-300">
                <i class="fas fa-dumbbell mr-3"></i>Implementos
              </button>
            </div>
          </div>
          
          <!-- Rango de precio -->
          <div class="mb-6">
            <h4 class="font-semibold text-gray-300 mb-4">Precio</h4>
            <div class="space-y-3">
              <div class="flex space-x-2">
                <input type="number" id="minPrice" placeholder="Min" class="filter-input rounded-lg px-3 py-2 text-white w-full" oninput="filterProducts()">
                <input type="number" id="maxPrice" placeholder="Max" class="filter-input rounded-lg px-3 py-2 text-white w-full" oninput="filterProducts()">
              </div>
              <div class="flex flex-wrap gap-2">
                <button onclick="setPriceRange(0, 50)" class="text-xs px-3 py-1 glass-card rounded-full hover:bg-white/10 transition-all text-gray-300">$0 - $50</button>
                <button onclick="setPriceRange(50, 100)" class="text-xs px-3 py-1 glass-card rounded-full hover:bg-white/10 transition-all text-gray-300">$50 - $100</button>
                <button onclick="setPriceRange(100, 200)" class="text-xs px-3 py-1 glass-card rounded-full hover:bg-white/10 transition-all text-gray-300">$100+</button>
              </div>
            </div>
          </div>
          
          <!-- Marcas -->
          <div class="mb-6">
            <h4 class="font-semibold text-gray-300 mb-4">Marcas</h4>
            <div class="space-y-2">
              <label class="flex items-center space-x-3 cursor-pointer">
                <input type="checkbox" class="brand-filter" value="Nike" onchange="filterProducts()">
                <span class="text-gray-300">Nike</span>
              </label>
              <label class="flex items-center space-x-3 cursor-pointer">
                <input type="checkbox" class="brand-filter" value="Adidas" onchange="filterProducts()">
                <span class="text-gray-300">Adidas</span>
              </label>
              <label class="flex items-center space-x-3 cursor-pointer">
                <input type="checkbox" class="brand-filter" value="Puma" onchange="filterProducts()">
                <span class="text-gray-300">Puma</span>
              </label>
              <label class="flex items-center space-x-3 cursor-pointer">
                <input type="checkbox" class="brand-filter" value="Under Armour" onchange="filterProducts()">
                <span class="text-gray-300">Under Armour</span>
              </label>
            </div>
          </div>
          
          <!-- Tallas -->
          <div class="mb-6">
            <h4 class="font-semibold text-gray-300 mb-4">Tallas</h4>
            <div class="grid grid-cols-3 gap-2">
              <button onclick="toggleSize('XS')" class="size-btn text-xs px-3 py-2 glass-card rounded-lg hover:bg-white/10 transition-all text-gray-300">XS</button>
              <button onclick="toggleSize('S')" class="size-btn text-xs px-3 py-2 glass-card rounded-lg hover:bg-white/10 transition-all text-gray-300">S</button>
              <button onclick="toggleSize('M')" class="size-btn text-xs px-3 py-2 glass-card rounded-lg hover:bg-white/10 transition-all text-gray-300">M</button>
              <button onclick="toggleSize('L')" class="size-btn text-xs px-3 py-2 glass-card rounded-lg hover:bg-white/10 transition-all text-gray-300">L</button>
              <button onclick="toggleSize('XL')" class="size-btn text-xs px-3 py-2 glass-card rounded-lg hover:bg-white/10 transition-all text-gray-300">XL</button>
              <button onclick="toggleSize('XXL')" class="size-btn text-xs px-3 py-2 glass-card rounded-lg hover:bg-white/10 transition-all text-gray-300">XXL</button>
            </div>
          </div>
          
          <!-- Botón limpiar filtros -->
          <button onclick="clearFilters()" class="w-full gradient-bg text-white py-3 rounded-xl hover:scale-105 transition-all font-medium">
            <i class="fas fa-refresh mr-2"></i>
            Limpiar filtros
          </button>
        </div>
      </aside>
      
      <!-- 🛍️ Grid de productos -->
      <section class="lg:col-span-3">
        <div class="flex items-center justify-between mb-6">
          <div>
            <h2 class="text-2xl font-bold text-white" id="categoryTitle">Todos los productos</h2>
            <p class="text-gray-400" id="productCount">Mostrando 59 productos</p>
          </div>
          
          <div class="flex items-center space-x-2">
            <button onclick="setGridView(2)" class="p-2 glass-card rounded-lg hover:bg-white/10 transition-all">
              <i class="fas fa-th-large text-gray-300"></i>
            </button>
            <button onclick="setGridView(3)" class="p-2 glass-card rounded-lg hover:bg-white/10 transition-all">
              <i class="fas fa-th text-gray-300"></i>
            </button>
            <button onclick="setGridView(4)" class="p-2 glass-card rounded-lg hover:bg-white/10 transition-all">
              <i class="fas fa-grip-horizontal text-gray-300"></i>
            </button>
          </div>
        </div>
        
        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
          <!-- Los productos se cargarán aquí -->
        </div>
        
        <!-- Paginación -->
        <div class="mt-12 flex justify-center">
          <div class="flex items-center space-x-2">
            <button class="px-4 py-2 glass-card rounded-lg hover:bg-white/10 transition-all text-gray-300">
              <i class="fas fa-chevron-left"></i>
            </button>
            <button class="px-4 py-2 gradient-bg text-white rounded-lg">1</button>
            <button class="px-4 py-2 glass-card rounded-lg hover:bg-white/10 transition-all text-gray-300">2</button>
            <button class="px-4 py-2 glass-card rounded-lg hover:bg-white/10 transition-all text-gray-300">3</button>
            <button class="px-4 py-2 glass-card rounded-lg hover:bg-white/10 transition-all text-gray-300">
              <i class="fas fa-chevron-right"></i>
            </button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Notification -->
  <div id="notification" class="fixed top-24 right-6 glass-card text-white px-6 py-4 rounded-2xl shadow-2xl transform translate-x-full transition-all duration-500 z-50 border elegant-shadow">
    <div class="flex items-center space-x-3">
      <div id="notificationIcon" class="w-10 h-10 rounded-full flex items-center justify-center">
        <i class="fas fa-check text-white"></i>
      </div>
      <div>
        <div class="font-bold" id="notificationTitle">Notificación</div>
        <div class="text-gray-300 text-sm" id="notificationMessage">Mensaje</div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('catalogo.static', filename='js/script.js') }}"></script>
</body>
</html>
